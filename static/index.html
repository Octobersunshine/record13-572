<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音频播放进度记录 - 多设备同步</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 32px;
            max-width: 640px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 8px;
            font-size: 24px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .device-badge {
            display: inline-block;
            background: #e3f2fd;
            color: #1565c0;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-family: monospace;
            margin-bottom: 16px;
        }
        .device-badge::before {
            content: "📱 本设备: ";
            font-family: sans-serif;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            color: #555;
            font-size: 14px;
            margin-bottom: 6px;
            font-weight: 500;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        audio {
            width: 100%;
            margin: 20px 0;
        }
        .status {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .status.info {
            background: #e3f2fd;
            color: #1565c0;
        }
        .status.success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .status.error {
            background: #ffebee;
            color: #c62828;
        }
        .progress-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 16px;
        }
        .info-card {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 8px;
        }
        .info-card.highlight {
            background: linear-gradient(135deg, #e3f2fd, #f3e5f5);
            border: 1px solid #bbdefb;
        }
        .info-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
        }
        .info-value {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        .info-value small {
            font-size: 11px;
            font-weight: normal;
            color: #888;
        }
        .device-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .device-section h3 {
            font-size: 14px;
            color: #555;
            margin-bottom: 12px;
        }
        .device-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .device-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: #fafafa;
            border-radius: 8px;
            font-size: 13px;
        }
        .device-item.current {
            background: #e8f5e9;
            border-left: 3px solid #66bb6a;
        }
        .device-item.source {
            background: #fff3e0;
            border-left: 3px solid #ffa726;
        }
        .device-name {
            font-family: monospace;
            color: #333;
            font-weight: 500;
        }
        .device-progress {
            color: #667eea;
            font-weight: 600;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        button {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        button:active { transform: scale(0.98); }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-secondary {
            background: #eee;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 音频播放进度记录</h1>
        <p class="subtitle">多设备自动同步 · 手机平板进度互通</p>

        <span class="device-badge" id="deviceBadge">-</span>
        <button class="btn-secondary" style="padding: 4px 10px; font-size: 12px; flex: none; margin-bottom: 16px;" onclick="resetDeviceId()">重置设备ID</button>

        <div class="form-group">
            <label for="userId">用户 ID</label>
            <input type="text" id="userId" value="user_001" placeholder="输入用户标识">
        </div>

        <div class="form-group">
            <label for="audioId">音频 ID</label>
            <input type="text" id="audioId" value="audio_001" placeholder="输入音频标识">
        </div>

        <audio id="audioPlayer" controls>
            <source src="https://www.w3schools.com/html/horse.mp3" type="audio/mpeg">
            您的浏览器不支持音频播放。
        </audio>

        <div id="status" class="status info">准备就绪，开始播放以记录进度...</div>

        <div class="progress-info">
            <div class="info-card">
                <div class="info-label">当前位置</div>
                <div class="info-value" id="currentPosition">0.0 秒</div>
            </div>
            <div class="info-card highlight">
                <div class="info-label">云端最佳进度</div>
                <div class="info-value" id="savedPosition">无记录<br><small id="sourceDevice"></small></div>
            </div>
            <div class="info-card">
                <div class="info-label">播放进度</div>
                <div class="info-value" id="playProgress">0%</div>
            </div>
            <div class="info-card">
                <div class="info-label">上次更新</div>
                <div class="info-value" id="lastUpdate">-</div>
            </div>
        </div>

        <div class="device-section">
            <h3>📊 各设备进度同步状态</h3>
            <div class="device-list" id="deviceList">
                <div style="color: #999; font-size: 13px;">暂无设备数据</div>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-primary" onclick="saveProgress()">立即保存进度</button>
            <button class="btn-secondary" onclick="loadProgress()">同步云端进度</button>
        </div>
    </div>

    <script>
        const DEVICE_ID_KEY = 'audio_tracker_device_id';
        const audio = document.getElementById('audioPlayer');
        const userIdInput = document.getElementById('userId');
        const audioIdInput = document.getElementById('audioId');
        const statusEl = document.getElementById('status');
        const currentPosEl = document.getElementById('currentPosition');
        const savedPosEl = document.getElementById('savedPosition');
        const sourceDeviceEl = document.getElementById('sourceDevice');
        const progressEl = document.getElementById('playProgress');
        const lastUpdateEl = document.getElementById('lastUpdate');
        const deviceBadgeEl = document.getElementById('deviceBadge');
        const deviceListEl = document.getElementById('deviceList');

        let saveTimer = null;
        const SAVE_INTERVAL = 5000;

        function getOrCreateDeviceId() {
            let deviceId = localStorage.getItem(DEVICE_ID_KEY);
            if (!deviceId) {
                deviceId = 'dev_' + Math.random().toString(36).substring(2, 10);
                localStorage.setItem(DEVICE_ID_KEY, deviceId);
            }
            return deviceId;
        }

        function resetDeviceId() {
            if (confirm('确定重置设备ID？重置后此设备将被识别为新设备。')) {
                localStorage.removeItem(DEVICE_ID_KEY);
                location.reload();
            }
        }

        const deviceId = getOrCreateDeviceId();
        deviceBadgeEl.textContent = deviceId;

        function setStatus(message, type = 'info') {
            statusEl.className = `status ${type}`;
            statusEl.textContent = message;
        }

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0.0 秒';
            if (seconds < 60) return `${seconds.toFixed(1)} 秒`;
            const mins = Math.floor(seconds / 60);
            const secs = (seconds % 60).toFixed(1);
            return `${mins}分 ${secs} 秒`;
        }

        function renderDeviceList(devices, sourceDevice) {
            if (!devices || devices.length === 0) {
                deviceListEl.innerHTML = '<div style="color: #999; font-size: 13px;">暂无设备数据</div>';
                return;
            }
            deviceListEl.innerHTML = devices.map(d => {
                let cls = 'device-item';
                let tag = '';
                if (d.device_id === deviceId) {
                    cls += ' current';
                    tag = ' <span style="color:#2e7d32; font-size:11px;">（本设备）</span>';
                }
                if (d.device_id === sourceDevice) {
                    cls += ' source';
                    tag += ' <span style="color:#e65100; font-size:11px;">（最佳进度来源）</span>';
                }
                const time = new Date(d.updated_at).toLocaleTimeString('zh-CN');
                return `<div class="${cls}">
                    <div>
                        <span class="device-name">${d.device_id}</span>${tag}
                        <div style="font-size:11px; color:#999; margin-top:2px;">更新于 ${time}</div>
                    </div>
                    <div class="device-progress">${formatTime(d.position)} · ${d.percentage.toFixed(1)}%</div>
                </div>`;
            }).join('');
        }

        audio.addEventListener('timeupdate', () => {
            currentPosEl.textContent = formatTime(audio.currentTime);
            if (audio.duration) {
                const percent = ((audio.currentTime / audio.duration) * 100).toFixed(1);
                progressEl.textContent = `${percent}%`;
            }
        });

        audio.addEventListener('play', () => {
            setStatus('🎧 播放中，将每 5 秒自动同步进度到云端...', 'info');
            startAutoSave();
        });

        audio.addEventListener('pause', () => {
            setStatus('⏸️ 已暂停，正在同步进度...', 'info');
            saveProgress();
            stopAutoSave();
        });

        audio.addEventListener('ended', () => {
            setStatus('✅ 播放完成，进度已同步', 'success');
            saveProgress();
            stopAutoSave();
        });

        function startAutoSave() {
            stopAutoSave();
            saveTimer = setInterval(() => {
                saveProgress();
            }, SAVE_INTERVAL);
        }

        function stopAutoSave() {
            if (saveTimer) {
                clearInterval(saveTimer);
                saveTimer = null;
            }
        }

        async function saveProgress() {
            const user_id = userIdInput.value.trim();
            const audio_id = audioIdInput.value.trim();

            if (!user_id || !audio_id) {
                setStatus('⚠️ 请填写用户 ID 和音频 ID', 'error');
                return;
            }

            const position = audio.currentTime;
            const duration = audio.duration || 0;

            try {
                const res = await fetch('/api/progress', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id, audio_id, device_id: deviceId, position, duration })
                });
                const data = await res.json();

                if (data.success) {
                    savedPosEl.innerHTML = `${formatTime(data.data.position)}<br><small>来自 ${data.data.source_device}</small>`;
                    lastUpdateEl.textContent = new Date(data.data.updated_at).toLocaleTimeString('zh-CN');
                    renderDeviceList(data.data.devices, data.data.source_device);
                    if (!audio.paused) {
                        setStatus(`✅ 已同步: ${formatTime(data.data.position)} (最佳来自 ${data.data.source_device})`, 'success');
                    }
                } else {
                    setStatus(`❌ 同步失败: ${data.message}`, 'error');
                }
            } catch (err) {
                setStatus(`❌ 网络错误: ${err.message}`, 'error');
            }
        }

        async function loadProgress() {
            const user_id = userIdInput.value.trim();
            const audio_id = audioIdInput.value.trim();

            if (!user_id || !audio_id) {
                setStatus('⚠️ 请填写用户 ID 和音频 ID', 'error');
                return;
            }

            setStatus('📡 正在从云端拉取最佳进度...', 'info');

            try {
                const res = await fetch(`/api/progress/${encodeURIComponent(user_id)}/${encodeURIComponent(audio_id)}`);
                const data = await res.json();

                if (data.success && data.data) {
                    const { position, percentage, source_device, devices } = data.data;
                    savedPosEl.innerHTML = `${formatTime(position)}<br><small>来自 ${source_device}</small>`;
                    progressEl.textContent = `${percentage.toFixed(1)}%`;
                    lastUpdateEl.textContent = new Date(data.data.updated_at).toLocaleTimeString('zh-CN');
                    renderDeviceList(devices, source_device);

                    const applySeek = () => {
                        if (Math.abs(audio.currentTime - position) > 1.0) {
                            audio.currentTime = position;
                        }
                    };

                    if (audio.readyState >= 1) {
                        applySeek();
                        setStatus(`✅ 已同步最佳进度: ${formatTime(position)} (来自 ${source_device})`, 'success');
                    } else {
                        audio.addEventListener('loadedmetadata', function onLoaded() {
                            applySeek();
                            setStatus(`✅ 已同步最佳进度: ${formatTime(position)} (来自 ${source_device})`, 'success');
                            audio.removeEventListener('loadedmetadata', onLoaded);
                        });
                    }
                } else {
                    setStatus('ℹ️ 云端暂无播放记录，将从头开始播放', 'info');
                    savedPosEl.innerHTML = '无记录';
                    deviceListEl.innerHTML = '<div style="color: #999; font-size: 13px;">暂无设备数据</div>';
                }
            } catch (err) {
                setStatus(`❌ 同步失败: ${err.message}`, 'error');
            }
        }

        userIdInput.addEventListener('change', loadProgress);
        audioIdInput.addEventListener('change', loadProgress);

        audio.addEventListener('loadedmetadata', () => {
            loadProgress();
        });
    </script>
</body>
</html>
