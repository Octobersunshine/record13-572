<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音频播放进度记录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 32px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 8px;
            font-size: 24px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            color: #555;
            font-size: 14px;
            margin-bottom: 6px;
            font-weight: 500;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        audio {
            width: 100%;
            margin: 20px 0;
        }
        .status {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .status.info {
            background: #e3f2fd;
            color: #1565c0;
        }
        .status.success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .status.error {
            background: #ffebee;
            color: #c62828;
        }
        .progress-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 16px;
        }
        .info-card {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 8px;
        }
        .info-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
        }
        .info-value {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        button {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        button:active { transform: scale(0.98); }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-secondary {
            background: #eee;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 音频播放进度记录</h1>
        <p class="subtitle">自动记录播放位置，下次打开自动跳转</p>

        <div class="form-group">
            <label for="userId">用户 ID</label>
            <input type="text" id="userId" value="user_001" placeholder="输入用户标识">
        </div>

        <div class="form-group">
            <label for="audioId">音频 ID</label>
            <input type="text" id="audioId" value="audio_001" placeholder="输入音频标识">
        </div>

        <audio id="audioPlayer" controls>
            <source src="https://www.w3schools.com/html/horse.mp3" type="audio/mpeg">
            您的浏览器不支持音频播放。
        </audio>

        <div id="status" class="status info">准备就绪，开始播放以记录进度...</div>

        <div class="progress-info">
            <div class="info-card">
                <div class="info-label">当前位置</div>
                <div class="info-value" id="currentPosition">0.0 秒</div>
            </div>
            <div class="info-card">
                <div class="info-label">已保存位置</div>
                <div class="info-value" id="savedPosition">无记录</div>
            </div>
            <div class="info-card">
                <div class="info-label">播放进度</div>
                <div class="info-value" id="playProgress">0%</div>
            </div>
            <div class="info-card">
                <div class="info-label">上次更新</div>
                <div class="info-value" id="lastUpdate">-</div>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-primary" onclick="saveProgress()">立即保存进度</button>
            <button class="btn-secondary" onclick="loadProgress()">读取上次进度</button>
        </div>
    </div>

    <script>
        const audio = document.getElementById('audioPlayer');
        const userIdInput = document.getElementById('userId');
        const audioIdInput = document.getElementById('audioId');
        const statusEl = document.getElementById('status');
        const currentPosEl = document.getElementById('currentPosition');
        const savedPosEl = document.getElementById('savedPosition');
        const progressEl = document.getElementById('playProgress');
        const lastUpdateEl = document.getElementById('lastUpdate');

        let saveTimer = null;
        const SAVE_INTERVAL = 5000;

        function setStatus(message, type = 'info') {
            statusEl.className = `status ${type}`;
            statusEl.textContent = message;
        }

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0.0 秒';
            if (seconds < 60) return `${seconds.toFixed(1)} 秒`;
            const mins = Math.floor(seconds / 60);
            const secs = (seconds % 60).toFixed(1);
            return `${mins}分 ${secs} 秒`;
        }

        audio.addEventListener('timeupdate', () => {
            currentPosEl.textContent = formatTime(audio.currentTime);
            if (audio.duration) {
                const percent = ((audio.currentTime / audio.duration) * 100).toFixed(1);
                progressEl.textContent = `${percent}%`;
            }
        });

        audio.addEventListener('play', () => {
            setStatus('🎧 播放中，将每 5 秒自动保存进度...', 'info');
            startAutoSave();
        });

        audio.addEventListener('pause', () => {
            setStatus('⏸️ 已暂停，正在保存进度...', 'info');
            saveProgress();
            stopAutoSave();
        });

        audio.addEventListener('ended', () => {
            setStatus('✅ 播放完成，进度已保存', 'success');
            saveProgress();
            stopAutoSave();
        });

        function startAutoSave() {
            stopAutoSave();
            saveTimer = setInterval(() => {
                saveProgress();
            }, SAVE_INTERVAL);
        }

        function stopAutoSave() {
            if (saveTimer) {
                clearInterval(saveTimer);
                saveTimer = null;
            }
        }

        async function saveProgress() {
            const user_id = userIdInput.value.trim();
            const audio_id = audioIdInput.value.trim();

            if (!user_id || !audio_id) {
                setStatus('⚠️ 请填写用户 ID 和音频 ID', 'error');
                return;
            }

            const position = audio.currentTime;
            const duration = audio.duration || 0;

            try {
                const res = await fetch('/api/progress', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id, audio_id, position, duration })
                });
                const data = await res.json();

                if (data.success) {
                    savedPosEl.textContent = formatTime(data.data.position);
                    const lastUpdate = new Date(data.data.updated_at);
                    lastUpdateEl.textContent = lastUpdate.toLocaleTimeString('zh-CN');
                    if (!audio.paused) {
                        setStatus(`✅ 进度已保存: ${formatTime(data.data.position)}`, 'success');
                    }
                } else {
                    setStatus(`❌ 保存失败: ${data.message}`, 'error');
                }
            } catch (err) {
                setStatus(`❌ 网络错误: ${err.message}`, 'error');
            }
        }

        async function loadProgress() {
            const user_id = userIdInput.value.trim();
            const audio_id = audioIdInput.value.trim();

            if (!user_id || !audio_id) {
                setStatus('⚠️ 请填写用户 ID 和音频 ID', 'error');
                return;
            }

            setStatus('📡 正在读取上次播放进度...', 'info');

            try {
                const res = await fetch(`/api/progress/${encodeURIComponent(user_id)}/${encodeURIComponent(audio_id)}`);
                const data = await res.json();

                if (data.success && data.data) {
                    const { position, percentage } = data.data;
                    savedPosEl.textContent = formatTime(position);
                    progressEl.textContent = `${percentage.toFixed(1)}%`;
                    lastUpdateEl.textContent = new Date(data.data.updated_at).toLocaleTimeString('zh-CN');

                    if (audio.readyState >= 1) {
                        audio.currentTime = position;
                        setStatus(`✅ 已跳转到上次位置: ${formatTime(position)} (${percentage.toFixed(1)}%)`, 'success');
                    } else {
                        audio.addEventListener('loadedmetadata', function onLoaded() {
                            audio.currentTime = position;
                            setStatus(`✅ 已跳转到上次位置: ${formatTime(position)} (${percentage.toFixed(1)}%)`, 'success');
                            audio.removeEventListener('loadedmetadata', onLoaded);
                        });
                    }
                } else {
                    setStatus('ℹ️ 暂无播放记录，将从头开始播放', 'info');
                    savedPosEl.textContent = '无记录';
                }
            } catch (err) {
                setStatus(`❌ 读取失败: ${err.message}`, 'error');
            }
        }

        userIdInput.addEventListener('change', loadProgress);
        audioIdInput.addEventListener('change', loadProgress);

        audio.addEventListener('loadedmetadata', () => {
            loadProgress();
        });
    </script>
</body>
</html>
